<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube without Spoilers</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="row">
      <h1>No Spoilers</h1>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>
    <p class="hint" id="status-hint"></p>
  </header>

  <section class="mode-section">
    <div class="mode-tabs" role="tablist">
      <button class="mode-tab" data-mode="whitelist" data-i18n="modeWhitelist" role="tab">Selected channels only</button>
      <button class="mode-tab" data-mode="global" data-i18n="modeGlobal" role="tab">Everywhere on YouTube</button>
    </div>
  </section>

  <section id="whitelist-section">
    <div class="section-title">
      <span data-i18n="channelsTitle">Channels with spoiler mode</span>
      <span class="count" id="channel-count">0</span>
    </div>

    <div id="current-channel-box" class="current-channel" hidden>
      <div class="current-channel-info">
        <div class="current-channel-name" id="current-channel-name">—</div>
        <div class="current-channel-meta" id="current-channel-meta">—</div>
      </div>
      <button id="add-current-channel" class="btn-primary" data-i18n="addBtn">+ Add</button>
    </div>

    <div id="channel-list" class="channel-list"></div>

    <div id="empty-state" class="empty-state" hidden>
      <p data-i18n="emptyTitle">List is empty.</p>
      <p class="muted" data-i18n="emptyHint">Visit a tournament/highlights channel and click "+ Add" above — the extension will hide spoilers only there.</p>
    </div>
  </section>

  <section class="toggles">
    <div class="section-title" data-i18n="togglesTitle">What to hide</div>
    <label class="toggle"><input type="checkbox" data-hide="player_timeline" /><span data-i18n="togglePlayerTimeline">Timeline on video</span></label>
    <label class="toggle"><input type="checkbox" data-hide="player_duration" /><span data-i18n="togglePlayerDuration">Video duration</span></label>
    <label class="toggle"><input type="checkbox" data-hide="hover_preview" /><span data-i18n="toggleHoverPreview">Hover preview</span></label>
    <label class="toggle"><input type="checkbox" data-hide="chapters" /><span data-i18n="toggleChapters">Chapters</span></label>
    <label class="toggle"><input type="checkbox" data-hide="card_duration" /><span data-i18n="toggleCardDuration">Duration in feed thumbnails</span></label>
    <label class="toggle"><input type="checkbox" data-hide="card_hover_autoplay" /><span data-i18n="toggleCardHoverAutoplay">Hover autoplay preview</span></label>
  </section>

  <footer>
    <a href="#" id="feedback-link" target="_blank" rel="noopener" data-i18n="feedbackLink">Feedback &amp; bugs →</a>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>
    <span class="version">v0.3.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
